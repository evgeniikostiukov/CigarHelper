name: CI

on:
  push:
  pull_request:

jobs:
  dotnet-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Test solution
        run: dotnet test CigarHelper.sln -c Release --verbosity minimal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CigarHelper.Web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: CigarHelper.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

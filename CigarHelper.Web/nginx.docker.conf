# Обратный прокси для SPA: статика + /api → сервис api в Docker Compose.
# Edge (Caddy) часто передаёт X-Forwarded-Proto: https; иначе остаётся $scheme до nginx.
map $http_x_forwarded_proto $cigar_forwarded_proto {
    ''      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Без пути после хоста: исходный URI (/api/...) передаётся в Kestrel как есть (маршруты [Route("api/...")]).
    # Раньше было http://api:8080/ — префикс /api/ срезался → /auth/register и 404.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $cigar_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

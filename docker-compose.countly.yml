# Countly Community Edition (официальные образы + MongoDB + nginx).
# Не смешивается с основным docker-compose.yml — отдельный стек.
#
# Имя проекта Compose зафиксировано (name), чтобы не смешивать контейнеры
# с основным docker-compose.yml из того же каталога репозитория.
#
# Запуск из корня репозитория:
#   docker compose -f docker-compose.countly.yml up -d
#
# UI и SDK endpoint: http://localhost:${COUNTLY_HOST_PORT:-8888}
# Первый визит: мастер создания администратора.
#
# Остановка: docker compose -f docker-compose.countly.yml down
# Данные MongoDB: том countly-mongodb-data (down -v удалит их).

name: cigarhelper-countly

volumes:
  countly-mongodb-data:

networks:
  countly:

services:
  mongodb:
    image: docker.io/bitnami/mongodb:latest
    restart: unless-stopped
    volumes:
      - countly-mongodb-data:/bitnami
    networks:
      - countly

  countly-api:
    image: docker.io/countly/api:latest
    restart: unless-stopped
    environment:
      - COUNTLY_PLUGINS=mobile,web,desktop,plugins,density,locale,browser,sources,views,logger,systemlogs,populator,reports,crashes,push,star-rating,slipping-away-users,compare,server-stats,dbviewer,times-of-day,compliance-hub,alerts,onboarding,consolidate,remote-config,hooks,dashboards,sdk,data-manager
      - COUNTLY_CONFIG__MONGODB_HOST=mongodb
      - COUNTLY_CONFIG_API_API_WORKERS=4
      - COUNTLY_CONFIG__FILESTORAGE=gridfs
      - NODE_OPTIONS=--max-old-space-size=2048
    networks:
      - countly
    depends_on:
      - mongodb

  countly-frontend:
    image: docker.io/countly/frontend:latest
    restart: unless-stopped
    environment:
      - COUNTLY_PLUGINS=mobile,web,desktop,plugins,density,locale,browser,sources,views,logger,systemlogs,populator,reports,crashes,push,star-rating,slipping-away-users,compare,server-stats,dbviewer,times-of-day,compliance-hub,alerts,onboarding,consolidate,remote-config,hooks,dashboards,sdk,data-manager
      - COUNTLY_CONFIG__MONGODB_HOST=mongodb
      - NODE_OPTIONS=--max-old-space-size=2048
    networks:
      - countly
    depends_on:
      - mongodb

  nginx:
    image: docker.io/bitnami/nginx:latest
    restart: unless-stopped
    ports:
      - "${COUNTLY_HOST_PORT:-8888}:8080"
    volumes:
      - ./docker/countly/nginx.server.conf:/opt/bitnami/nginx/conf/server_blocks/countly.conf:ro
    networks:
      - countly
    depends_on:
      - countly-api
      - countly-frontend

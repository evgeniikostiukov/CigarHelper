# Инфраструктура и приложение в Docker.
#
# Только Postgres + MinIO (как раньше):
#   docker compose up -d postgres minio
#
# Полный стек (Postgres, MinIO, API, SPA): см. docs/docker.md
#   docker compose --profile full up -d --build
#
# Кратко: скопировать .env из .env.example, задать JWT_KEY (≥32 символов), затем профиль full.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - cigarhelper-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    volumes:
      - cigarhelper-minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    profiles: ['full']
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Cors__Origins__0: http://localhost:${WEB_PORT:-8080}
      ImageStorage__Minio__Endpoint: minio:9000
      ImageStorage__Minio__AccessKey: ${MINIO_ROOT_USER}
      ImageStorage__Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      ImageStorage__Minio__UseSsl: 'false'
      ForwardedHeaders__Enabled: 'false'
    ports:
      - "${API_HOST_PORT:-5184}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    profiles: ['full']
    build:
      context: ./CigarHelper.Web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  cigarhelper-pg:
  cigarhelper-minio:

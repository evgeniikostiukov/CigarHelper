# Локальная PostgreSQL для разработки. API: `dotnet run --project CigarHelper.API/CigarHelper.Api.csproj`
# со строкой подключения на host `localhost`, порт 5432 (см. docs/memory-bank/workflow.md).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cigarhelper
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: cigarhelper
    ports:
      - "5432:5432"
    volumes:
      - cigarhelper-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cigarhelper -d cigarhelper']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    volumes:
      - cigarhelper-minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cigarhelper-pg:
  cigarhelper-minio:
